<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Forca</title>
    <link rel="stylesheet" href="game.css">
    </link>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Pixelify+Sans:wght@400..700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="overlay">
    </div>
    <div class="background-container">
        <div class="stars layer1"></div>
        <div class="stars layer2"></div>
        <div class="stars layer3"></div>
        <div class="content-container">
            <div class="theme-container">
                <div class="theme-header">Tema selecionado:</div>
                <div class="chosen-theme"></div>
            </div>
            <div class="tries-left-container">
                <div class="tries-left-header"> Tentativas restantes:</div>
                <div class="tries-left-content"></div>
            </div>
            <div class="word-container">
            </div>
            <div class="alphabet-container">
                <div class="alphabet-box" id="a">a</div>
                <div class="alphabet-box" id="b">b</div>
                <div class="alphabet-box" id="c">c</div>
                <div class="alphabet-box" id="d">d</div>
                <div class="alphabet-box" id="e">e</div>
                <div class="alphabet-box" id="f">f</div>
                <div class="alphabet-box" id="g">g</div>
                <div class="alphabet-box" id="h">h</div>
                <div class="alphabet-box" id="i">i</div>
                <div class="alphabet-box" id="j">j</div>
                <div class="alphabet-box" id="k">k</div>
                <div class="alphabet-box" id="l">l</div>
                <div class="alphabet-box" id="m">m</div>
                <div class="alphabet-box" id="n">n</div>
                <div class="alphabet-box" id="o">o</div>
                <div class="alphabet-box" id="p">p</div>
                <div class="alphabet-box" id="q">q</div>
                <div class="alphabet-box" id="r">r</div>
                <div class="alphabet-box" id="s">s</div>
                <div class="alphabet-box" id="t">t</div>
                <div class="alphabet-box" id="u">u</div>
                <div class="alphabet-box" id="v">v</div>
                <div class="alphabet-box" id="w">w</div>
                <div class="alphabet-box" id="x">x</div>
                <div class="alphabet-box" id="y">y</div>
                <div class="alphabet-box" id="z">z</div>
            </div>
</body>
<script src="game.js"></script>
<script src="background.js"></script>

</html>
